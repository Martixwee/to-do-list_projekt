<div class="card">
  <h2>📖 {{title}}</h2>
  
  <div style="margin: 1.5rem 0;">
    <p><strong>Stav:</strong> {{statusText}}</p>
    
    <p style="margin-top: 20px;"><strong>📝 Popis:</strong></p>
    <div style="background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #ddd; color: #1a1a1a !important; min-height: 100px; white-space: pre-wrap; font-size: 0.95rem;">
      {{description}}
    </div>
  </div>

  <div class="actions" style="margin-top: 2rem; display: flex; gap: 8px;">
    <a href="/edit/{{id}}"><button type="button">✏️ Upravit</button></a>
    <a href="/"><button type="button">⬅️ Zpět</button></a>
    <button type="button" data-delete-id="{{id}}" class="btn-del">🗑️ Smazat</button>
  </div>
</div>
