<div class="section">
  <h3>➕ Přidat nový úkol</h3>
  <form id="createForm" style="display: flex; gap: 10px;">
    <input type="text" name="title" placeholder="Název úkolu..." required>
    <button type="submit" style="white-space: nowrap;">Přidat úkol</button>
  </form>
</div>

<hr style="margin: 2rem 0; border: 0; border-top: 1px solid #eee;">

<div class="section">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h3>📋 Seznam úkolů</h3>
  <div class="filter-bar">
  <button class="filter-btn active" onclick="filterTasks('all', this)">Vše 📋</button>
  <button class="filter-btn" onclick="filterTasks('pending', this)">Nesplněno ⏳</button>
  <button class="filter-btn" onclick="filterTasks('completed', this)">Splněno ✅</button>
</div>
  </div>

  <table>
    <thead>
      <tr>
        <th class="col-id">#</th>
        <th class="col-task">Úkol</th>
        <th class="col-status">Stav</th>
        <th class="col-actions">Akce</th>
      </tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>
</div>
