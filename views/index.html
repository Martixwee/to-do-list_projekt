<div class="card">
  <h2>Přidat nový úkol</h2>
  <form id="createForm">
    <div class="row">
      <label>Co je potřeba udělat:</label><br />
      <input name="title" placeholder="Např. Koupit rohlíky" required />
    </div>
    <button type="submit">Přidat úkol</button>
    <p class="muted" id="createMsg"></p>
  </form>
</div>

<div class="card">
  <h2>Můj seznam úkolů</h2>
  <table>
    <thead>
      <tr>
        <th>Stav</th><th>Úkol</th><th>Akce</th>
      </tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>
</div>

  <p class="muted">Tip: Smazání je přes DELETE, editace přes PUT (odesílá se přes JS fetch).</p>
</div>
