<div class="card">
  <h2>Přidat nový úkol</h2>
<form id="createForm">
  <input type="text" name="title" placeholder="Co je třeba udělat?" required>
  <button type="submit">Přidat úkol</button>
</form>
</div>

<div class="card">
  <h2>🔍 Filtrovat úkoly</h2>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterTasks('all', this)">Vše 📋</button>
    <button class="filter-btn" onclick="filterTasks('pending', this)">Nesplněno ⏳</button>
    <button class="filter-btn" onclick="filterTasks('completed', this)">Splněno ✅</button>
  </div>
</div>

<div class="card">
  <h2>Můj seznam úkolů</h2>
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Úkol</th>
      <th>Stav</th>
      <th>Akce</th>
    </tr>
  </thead>
  <tbody>
    {{rows}}
  </tbody>
</table>
