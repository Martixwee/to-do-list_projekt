<div class="card">
  <h2>Upravit úkol: {{title}}</h2> 
  <form id="editForm" data-id="{{id}}"> 
    <div class="row">
      <label>Název úkolu:</label>
      <input type="text" name="title" value="{{title}}" required />
    </div>
    
    <div class="row">
      <label>Popis / Detail úkolu:</label><br>
      <textarea name="description" rows="5" style="width: 100%; max-width: 420px; padding: 0.5rem; margin-top: 0.3rem;">{{description}}</textarea>
    </div>
    
    <div class="row">
      <label>
        <input type="checkbox" name="completed" {{checked}} /> Splněno
      </label>
    </div>
    
    <div class="actions">
      <button type="submit">Uložit změny</button>
      <a href="/"><button type="button">Zrušit</button></a>
    </div>
  </form>
  <p id="editMsg"></p>
</div>
