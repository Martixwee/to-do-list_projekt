<div class="card">
  <h2>Upravit úkol #{{id}}</h2>
  <form id="editForm" data-id="{{id}}">
    <div class="row">
      <label>Název úkolu:</label>
      <input name="title" value="{{title}}" required />
    </div>
    <div class="row">
      <label>
        <input type="checkbox" name="completed" {{checked}} /> Splněno
      </label>
    </div>
    <button type="submit">Uložit změny</button>
    <a href="/">Zpět</a>
  </form>
  <p id="editMsg"></p>
</div>
