<div class="card">
  <h2>✏️ Upravit úkol</h2>
  <form id="editForm" data-id="{{id}}">
    <div style="margin-bottom: 1rem;">
      <label><b>Název úkolu:</b></label><br>
      <input type="text" name="title" value="{{title}}" required style="margin-top: 5px;">
    </div>
    
    <div style="margin-bottom: 1rem;">
      <label><b>Podrobný popis:</b></label><br>
      <textarea name="description" rows="6" style="margin-top: 5px; font-family: inherit;">{{description}}</textarea>
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
        <input type="hidden" name="completed" value="false">
        <input type="checkbox" name="completed" value="true" {{checked}}> 
        <b>Označit jako hotové</b>
      </label>
    </div>

    <div class="actions">
      <button type="submit" style="background: #059669; color: white; border: none;">💾 Uložit změny</button>
      <a href="/detail/{{id}}"><button type="button">❌ Zrušit</button></a>
    </div>
  </form>
</div>
